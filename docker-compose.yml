version: "3.8"
services:
  nora:
    build: .
    ports:
      - "6000:6000"
    volumes:
      - ./data:/data
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - NORA_DEV_MODE=true
      - NORA_SECRET=dev-secret-change-me
      - NORA_DB_PATH=/data/nora.db
      - NORA_PORT=6000
