meta:
  name: NZBGet
  category: Media
  icon: nzbget
  description: Efficient Usenet downloader
  capability: monitor_only
  homepage: https://nzbget.com

webhook:
  setup_instructions: |
    No webhook support. NORA monitors the JSON-RPC endpoint for availability.
    Configure base_url, username, and password to enable health checks.

monitor:
  check_type: url
  check_url: "{base_url}"
  healthy_status: 200
  check_interval: 5m
