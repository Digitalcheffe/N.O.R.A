meta:
  name: Diun
  category: Infrastructure
  icon: diun
  description: Docker image update notifier
  homepage: https://crazymax.dev/diun

webhook:
  setup_instructions: |
    Configure Diun to send webhooks to {base_url}/ingest/{token}.
    Diun's payload is fixed — configure via environment variables in
    docker-compose. See docs/diun-webhook-config.md for an example.
  recommended_events:
    - new
    - update
  not_recommended: []
  field_mappings:
    status:         "$.status"
    image:          "$.image"
    hostname:       "$.hostname"
    platform:       "$.platform"
    hub_link:       "$.hub_link"
    created:        "$.created"
    container_name: "$.metadata.ctn_names"
  severity_field: status
  display_template: "Image {status} — {image}"
  display_templates:
    new:    "New image — {image} on {hostname}"
    update: "Update available — {image} on {hostname}"
  severity_mapping:
    new: info
    update: info

digest:
  categories:
    # DIUN sends "new" and "update" events — both at info severity, both
    # meaningful to the user. Match on severity so the card covers every
    # image event without needing an OR clause the schema doesn't support.
    - source: webhook
      label: Image Updates
      match_severity: info
