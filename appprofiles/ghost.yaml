meta:
  name: Ghost
  category: Content
  icon: ghost
  description: Headless CMS for blogs and newsletters
  homepage: https://ghost.org

# Ghost doesn't include the event name in the webhook body, only the object
# key (post / member) + previous/current snapshots. event_type_keys below
# synthesizes a post.<status> or member.<added|edited> type from the shape
# of the payload so the same ingest URL can serve every configured event.

webhook:
  setup_instructions: |
    In Ghost Admin, go to Settings → Advanced → Integrations → Add custom integration.
    Create a separate webhook for each event you want to track — Ghost sends
    one event per webhook URL and does not include the event name in the body.
    Point each webhook at: {base_url}/ingest/{token}
  recommended_events:
    - post.published
    - post.added
    - member.added
    - member.edited
  not_recommended:
    - post.deleted
    - member.deleted
  field_mappings:
    post_title:    "$.post.current.title"
    post_status:   "$.post.current.status"
    post_url:      "$.post.current.url"
    post_author:   "$.post.current.primary_author.name"
    member_name:   "$.member.current.name"
    member_email:  "$.member.current.email"
    member_status: "$.member.current.status"
  event_type_keys:
    - key: post
      status_path: "$.post.current.status"
      prefix: "post."
      default: "post.updated"
    - key: member
      present_path: "$.member.previous.id"
      if_present: "member.edited"
      if_absent: "member.added"
  severity_field: event_type
  display_template: "Ghost event"
  display_templates:
    post.published: "Published — {post_title}"
    post.draft:     "Draft saved — {post_title}"
    post.scheduled: "Scheduled — {post_title}"
    post.updated:   "Post updated — {post_title}"
    member.added:   "New member — {member_name}"
    member.edited:  "Member updated — {member_name}"
  severity_mapping:
    post.published: info
    post.draft:     info
    post.scheduled: info
    post.updated:   info
    member.added:   info
    member.edited:  info


digest:
  widgets:
    - source: webhook
      label: Posts Published
      match_field: event_type
      match_value: post.published
    - source: webhook
      label: Drafts
      match_field: event_type
      match_value: post.draft
    - source: webhook
      label: Members Added
      match_field: event_type
      match_value: member.added
    - source: webhook
      label: Members Updated
      match_field: event_type
      match_value: member.edited
