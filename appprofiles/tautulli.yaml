meta:
  name: Tautulli
  category: Media
  icon: tautulli
  description: Plex media server monitoring and statistics
  homepage: https://tautulli.com

webhook:
  setup_instructions: |
    In Tautulli go to Settings → Notification Agents → Add → Webhook.
    Set the Webhook URL to {base_url}/ingest/{token} and configure triggers below.
  recommended_events:
    - Playback Start
    - Playback Stop
    - Playback Pause
    - Playback Resume
  not_recommended: []
  field_mappings:
    action: "$.action"
    user: "$.user"
    title: "$.title"
    media_type: "$.media_type"
    player: "$.player"
    quality: "$.quality"
  severity_field: ""
  display_template: "{action} — {title} ({user})"
  severity_mapping: {}


digest:
  categories:
    - label: Plays
      match_field: action
      match_value: play
      match_severity: ""
