meta:
  name: UniFi
  category: Network
  icon: unifi
  description: Ubiquiti UniFi network controller
  capability: monitor_only
  homepage: https://ui.com

webhook:
  setup_instructions: |
    No webhook support. NORA monitors the controller base URL for availability.

monitor:
  check_type: url
  check_url: "{base_url}"
  healthy_status: 200
  check_interval: 5m
