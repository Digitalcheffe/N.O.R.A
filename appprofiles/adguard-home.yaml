meta:
  name: AdGuard Home
  category: Network
  icon: adguard-home
  description: Network-wide ad and tracker blocking DNS server
  capability: monitor_only
  homepage: https://adguard.com/adguard-home

webhook:
  setup_instructions: |
    No webhook support. NORA monitors the status API endpoint.
    A shorter check interval is used because DNS availability is critical infrastructure.

monitor:
  check_type: url
  check_url: "{base_url}/control/status"
  healthy_status: 200
  check_interval: 2m
