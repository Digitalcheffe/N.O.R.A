meta:
  name: Home Assistant
  category: Automation
  icon: home-assistant
  description: Open-source home automation platform
  homepage: https://www.home-assistant.io

webhook:
  setup_instructions: |
    Send events from any Home Assistant automation using rest_command or
    notify.rest. Point the POST at {base_url}/ingest/{token} with a fixed
    JSON shape — action, subject, message, severity, extra — so NORA can
    route, title, and level every event the same way regardless of which
    automation fired it.
    See docs/home-assistant-webhook-config.md for a full example.
  recommended_events:
    - ha.event
  not_recommended: []
  field_mappings:
    action:   "$.action"
    subject:  "$.subject"
    message:  "$.message"
    severity: "$.severity"
  severity_field: severity
  # The user controls severity per-automation in the payload. An identity
  # mapping keeps the engine honest — without it the severity engine falls
  # back to "info" because an empty severity_mapping disables mapping.
  severity_mapping:
    info:     info
    warn:     warn
    error:    error
    critical: critical
  display_template: "{subject} — {message}"


digest:
  widgets:
    - source: webhook
      label: HA Events
      match_field: action
      match_value: ha.event
