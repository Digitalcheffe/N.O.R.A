meta:
  name: Sonarr
  category: Media
  icon: sonarr
  description: TV series management and download automation
  capability: full
  homepage: https://sonarr.tv

webhook:
  setup_instructions: |
    In Sonarr go to Settings → Connect → Add → Webhook.
    Set the URL to {base_url}/ingest/{token} and select the event types below.
  recommended_events:
    - On Download
    - On Upgrade
    - On Health Issue
    - On Application Update
  not_recommended:
    - On Grab
  field_mappings:
    event_type: "$.eventType"
    series_title: "$.series.title"
    episode_title: "$.episodes[0].title"
    season: "$.episodes[0].seasonNumber"
    episode: "$.episodes[0].episodeNumber"
    quality: "$.episodes[0].quality.quality.name"
    level: "$.level"
    message: "$.message"
  severity_field: event_type
  severity_compound_field: level
  display_template: "{event_type} — {series_title}"
  display_templates:
    Download: "Download — {series_title} S{season}E{episode}"
    Grab: "Grabbed — {series_title} S{season}E{episode}"
    Health: "Health Issue — {message}"
    HealthRestored: "Health Restored — {message}"
    ApplicationUpdate: "Sonarr updated to {message}"
  severity_mapping:
    Download: info
    Upgrade: info
    Grab: info
    Health: warn
    Health:error: error
    Health:warning: warn
    HealthRestored: info
    ApplicationUpdate: info
    Test: info

monitor:
  check_type: url
  check_url: "{base_url}"
  healthy_status: 200
  check_interval: 5m

digest:
  categories:
    - label: Downloads
      match_field: event_type
      match_value: Download
      match_severity: ""
    - label: Upgrades
      match_field: event_type
      match_value: Upgrade
      match_severity: ""
    - label: Health Issues
      match_field: event_type
      match_value: Health
      match_severity: ""
