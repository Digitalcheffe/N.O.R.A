meta:
  name: Sonarr
  category: Media
  icon: sonarr
  description: TV series management and download automation
  capability: full
  homepage: https://sonarr.tv

webhook:
  setup_instructions: |
    In Sonarr go to Settings → Connect → Add → Webhook.
    Set the URL to {base_url}/ingest/{token} and select the event types below.
  recommended_events:
    - On Download
    - On Upgrade
    - On Health Issue
    - On Application Update
  not_recommended:
    - On Grab
  field_mappings:
    event_type: "$.eventType"
    series_title: "$.series.title"
    episode_title: "$.episodes[0].title"
    season: "$.episodes[0].seasonNumber"
    episode: "$.episodes[0].episodeNumber"
    quality: "$.episodes[0].quality.quality.name"
    level: "$.level"
    message: "$.message"
  severity_field: event_type
  severity_compound_field: level
  display_template: "{event_type} — {series_title}"
  display_templates:
    Download: "Download — {series_title} S{season}E{episode}"
    Grab: "Grabbed — {series_title} S{season}E{episode}"
    Health: "Health Issue — {message}"
    HealthRestored: "Health Restored — {message}"
    ApplicationUpdate: "Sonarr updated to {message}"
  severity_mapping:
    Download: info
    Upgrade: info
    Grab: info
    Health: warn
    Health:error: error
    Health:warning: warn
    HealthRestored: info
    ApplicationUpdate: info
    Test: info


api_polling:
  - name: total_series
    label: Series Tracked
    path: /api/v3/series
    target: length
    value_type: count

  - name: queue_depth
    label: Queue Depth
    path: /api/v3/queue
    target: $.totalRecords
    value_type: count

  - name: health_issues
    label: Health Issues
    path: /api/v3/health
    target: length
    value_type: count

digest:
  categories:
    - source: webhook
      label: Downloads
      match_field: event_type
      match_value: Download
    - source: webhook
      label: Upgrades
      match_field: event_type
      match_value: Upgrade
    - source: webhook
      label: Health Issues
      match_field: event_type
      match_value: Health
  widgets:
    - source: api
      metric: total_series
      label: Series Tracked
    - source: api
      metric: queue_depth
      label: In Queue
    - source: webhook
      label: Downloads Today
      match_field: event_type
      match_value: Download
