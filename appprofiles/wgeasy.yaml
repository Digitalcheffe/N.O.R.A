meta:
  name: WG Easy
  category: Network
  icon: wireguard
  description: Easy WireGuard VPN server with web UI
  capability: monitor_only
  homepage: https://github.com/wg-easy/wg-easy

webhook:
  setup_instructions: |
    No webhook support. NORA monitors the WireGuard client API endpoint for availability.

monitor:
  check_type: url
  check_url: "{base_url}"
  healthy_status: 200
  check_interval: 5m
