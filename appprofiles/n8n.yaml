meta:
  name: n8n
  category: Automation
  icon: n8n
  description: Workflow automation platform
  homepage: https://n8n.io

webhook:
  setup_instructions: |
    n8n's built-in execution notifications require an enterprise license.
    Instead, add an HTTP Request node at the end of each workflow that POSTs
    a fixed JSON payload to {base_url}/ingest/{token}. Use one node on the
    success path with action=workflow.success, and one on the error path
    with action=workflow.error. See docs/n8n-webhook-config.md for the
    suggested node configuration.
  recommended_events:
    - workflow.success
    - workflow.error
  not_recommended: []
  field_mappings:
    action:        "$.action"
    event_type:    "$.action"
    workflow_name: "$.workflow_name"
    workflow_id:   "$.workflow_id"
    execution_id: "$.execution_id"
    error_message: "$.error_message"
    error_node:    "$.error_node"
  severity_field: action
  display_template: "{action} — {workflow_name}"
  display_templates:
    "workflow.success": "Workflow succeeded — {workflow_name}"
    "workflow.error":   "Workflow failed — {workflow_name} ({error_node}: {error_message})"
  severity_mapping:
    "workflow.success": info
    "workflow.error":   error


digest:
  widgets:
    - source: webhook
      label: Successful Runs
      match_field: action
      match_value: "workflow.success"
    - source: webhook
      label: Failures
      match_field: action
      match_value: "workflow.error"
