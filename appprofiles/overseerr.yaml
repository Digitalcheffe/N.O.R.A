meta:
  name: Overseerr
  category: Media
  icon: overseerr
  description: Media request management for Plex
  capability: full
  homepage: https://overseerr.dev

webhook:
  setup_instructions: |
    In Overseerr go to Settings → Notifications → Webhook.
    Set the Webhook URL to {base_url}/ingest/{token} and enable the notification types below.
  recommended_events:
    - Media Requested
    - Media Approved
    - Media Available
    - Media Failed
    - Issue Reported
  not_recommended: []
  field_mappings:
    notification_type: "$.notification_type"
    subject: "$.subject"
    message: "$.message"
    media_type: "$.media.media_type"
    requested_by: "$.request.requestedBy.displayName"
  severity_field: notification_type
  display_template: "{notification_type} — {subject}"
  severity_mapping:
    MEDIA_REQUESTED: info
    MEDIA_APPROVED: info
    MEDIA_AVAILABLE: info
    MEDIA_FAILED: error
    ISSUE_REPORTED: warn
    ISSUE_RESOLVED: info


digest:
  categories:
    - label: Requests
      match_field: notification_type
      match_value: MEDIA_REQUESTED
      match_severity: ""
    - label: Available
      match_field: notification_type
      match_value: MEDIA_AVAILABLE
      match_severity: ""
    - label: Issues
      match_field: ""
      match_value: ""
      match_severity: error
